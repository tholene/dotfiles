background {
  monitor =
  path = /home/tholene/Pictures/Wallpapers/wall.jpg
  blur_passes = 3
  blur_size = 10
  brightness = 0.82
  contrast = 1.05
  vibrancy = 0.10
}

input-field {
  monitor =
  size = 460, 58
  position = 0, -90
  halign = center
  valign = center

  font_family = JetBrainsMono Nerd Font
  font_size = 18

  dots_center = true
  dots_size = 0.20
  dots_spacing = 0.32

  rounding = 22
  outline_thickness = 2

  # iOS-ish "glass": light translucent fill + bright edge
  inner_color = rgba(ffffff22)
  outer_color = rgba(ffffff66)

  font_color = rgba(ffffffff)
  placeholder_text = <span foreground="##ffffffaa">Password</span>

  fade_on_empty = true
  hide_input = false

  # Optional: some hyprlock builds support these for extra frosted look.
  # If hyprlock errors, comment them out.
  blur_passes = 2
  blur_size = 6

  # Feedback
  fail_text = <span foreground="##ff5a5f">Wrong password</span>
}

label {
  monitor =
  text = $TIME
  font_size = 72
  font_family = JetBrainsMono Nerd Font
  color = rgba(ffffffff)
  position = 0, 140
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  font_size = 20
  font_family = JetBrainsMono Nerd Font
  color = rgba(ffffffcc)
  position = 0, 90
  halign = center
  valign = center
}