$mod = SUPER
$term = kitty
$launcher = wofi
$launcher_args = -S drun -I -t $term -n -W 20% -H 30% -i -p Search...

bind = $mod,       RETURN,     exec,      $term
bind = $mod,       SPACE,      exec,      pkill $launcher; $launcher $launcher_args
#bind = ,     ESCAPE,           exec,      pkill $launcher
bind = $mod,       Q,          killactive
bind = $mod SHIFT, F,          fullscreen
bind = $mod,       B,          exec,      pkill waybar; waybar
bind = $mod,       E,          exec,      thunar
bind = $mod,       C,          exec,      google-chrome-stable

# Focus movement
bind = $mod, H,  movefocus, l
bind = $mod, J,  movefocus, d
bind = $mod, K,  movefocus, u
bind = $mod, L,  movefocus, r

# Move windows around
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Switch workspaces (1-9)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move active window to workspace (1-9)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Toggle floating for the active window
bind = $mod, F, togglefloating

# Switch focus between monitors (so you can control each "desktop set")
bind = $mod, comma,  focusmonitor, -1
bind = $mod, period, focusmonitor, +1

# Screenshot: select region -> clipboard
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy

# Lock screen
bind = $mod, Escape, exec, hyprlock

# Scripts
bind = $mod SHIFT, F10, exec, ~/.config/hypr/scripts/toggle-hdr.sh
bind = $mod, F9,        exec, ~/.config/hypr/scripts/toggle-monitor-dp4.sh

# Volume keys
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
# Media keys
bind = , XF86AudioPlay,        exec, playerctl --player playerctld play-pause
bind = , XF86AudioPause,       exec, playerctl --player playerctld play-pause
bind = , XF86AudioNext,        exec, playerctl --player playerctld next
bind = , XF86AudioPrev,        exec, playerctl --player playerctld previous

# Wallpaper
#bind = $mod, W, exec, ~/.config/hypr/scripts/set-wallpaper.sh

# Keyboard layout
bind= ALT $mod, TAB, exec, ~/.config/hypr/scripts/switch-kb-layout.sh