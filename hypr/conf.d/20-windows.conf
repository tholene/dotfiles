windowrule {
 name = media-tag-opaque
 opaque = on
 match:tag = media
}

windowrule {
 name = volume-control
 float = on
 match:class = hyprmixer
 size = 768 500
 move = (cursor_x-(window_x/2)) (cursor_y+30)
}

windowrule {
 name = hide-faugus
 workspace = special:faugus silent
 match:class = faugus-launcer
}

